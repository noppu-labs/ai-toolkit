name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Biome
        run: npx biome ci .
      - name: Markdown lint
        run: npx markdownlint-cli2
      - name: Unit tests
        run: npm test
      - name: Lock consistency
        run: node scripts/skills-sync.mjs verify
      - name: Manifest sanity
        run: |
          node -e "
            const { readFileSync } = require('fs');
            JSON.parse(readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            for (const p of ['laravel', 'inertia-react']) {
              const m = JSON.parse(readFileSync(p + '/.claude-plugin/plugin.json', 'utf8'));
              if (m.name !== p) throw new Error('plugin.json name mismatch: ' + p);
            }
          "
      - name: Plugin validation
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .
