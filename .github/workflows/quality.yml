name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Biome
        run: npx biome ci .
      - name: Markdown lint
        run: npx markdownlint-cli2
      - name: Typecheck
        run: npm run typecheck
      - name: Site typecheck
        run: npm run typecheck -w site
      - name: Lock consistency
        run: npm run sync -- verify
      - name: Manifest sanity
        run: |
          node -e "
            const { readFileSync } = require('fs');
            JSON.parse(readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            for (const p of ['laravel', 'inertia-react']) {
              const m = JSON.parse(readFileSync(p + '/.claude-plugin/plugin.json', 'utf8'));
              if (m.name !== p) throw new Error('plugin.json name mismatch: ' + p);
            }
          "
      - name: Plugin validation
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .
      - name: Site build
        run: npm run build -w site
