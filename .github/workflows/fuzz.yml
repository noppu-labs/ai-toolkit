name: fuzz

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly deep fuzz with 50x the per-PR run count.
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fuzz property tests (fast-check, high run count)
        run: npm run fuzz
        env:
          FC_NUM_RUNS: ${{ github.event_name == 'schedule' && '50000' || '1000' }}
