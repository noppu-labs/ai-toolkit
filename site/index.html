<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Toolkit — Claude Code plugins for Laravel & React</title>
    <meta
      name="description"
      content="Agents and skills for agentic development in modern Laravel and React applications."
    />
    <script>
      (() => {
        const stored = localStorage.getItem("theme");
        const dark =
          stored === "dark" ||
          ((stored === null || stored === "system") &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
